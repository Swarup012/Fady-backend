name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
          cache-to: type=inline
          platforms: linux/amd64
      
      - name: Install Border0 CLI
        run: |
          wget https://download.border0.com/linux_amd64/border0 -O /tmp/border0
          chmod +x /tmp/border0
          sudo mv /tmp/border0 /usr/local/bin/border0
          border0 version

      # Method 1: Login with token via stdin
      - name: Authenticate Border0 CLI
        env:
          BORDER0_TOKEN: ${{ secrets.BORDER0_TOKEN }}
        run: |
          echo "$BORDER0_TOKEN" | border0 login

      # Deploy to EC2
      - name: Deploy to EC2 via Border0
        run: |
          border0 ssh ${{ secrets.BORDER0_SOCKET_NAME }} << 'ENDSSH'
            set -e
            cd /home/ubuntu
            bash deploy.sh
          ENDSSH

      # Verify deployment
      - name: Verify deployment
        run: |
          sleep 10
          border0 ssh ${{ secrets.BORDER0_SOCKET_NAME }} << 'ENDSSH'
            set -e
            
            # Check if container is running
            if ! docker ps | grep -q fady-backend; then
              echo "❌ Container is not running"
              docker logs --tail 50 fady-backend
              exit 1
            fi
            
            echo "✅ Container is running"
            docker ps | grep fady-backend
            
            # Check health endpoint
            if docker exec fady-backend curl -f http://localhost:3000/health; then
              echo "✅ Health check passed!"
            else
              echo "❌ Health check failed"
              exit 1
            fi
          ENDSSH

      # Cleanup
      - name: Logout from Border0
        if: always()
        run: |
          border0 logout || true