name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      BORDER0_TOKEN: ${{ secrets.BORDER0_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
          cache-to: type=inline
          platforms: linux/amd64

      - name: Install Border0 CLI
        run: |
          wget https://download.border0.com/linux_amd64/border0 -O /tmp/border0
          chmod +x /tmp/border0
          sudo mv /tmp/border0 /usr/local/bin/border0
          border0 version

      - name: Test Border0 Authentication
        run: |
          border0 whoami

      - name: Border0 SSH sanity test
        run: |
          border0 whoami
          border0 client ssh ${{ secrets.BORDER0_SOCKET_NAME }} -- whoami

      - name: Deploy
        run: |
          border0 client ssh ${{ secrets.BORDER0_SOCKET_NAME }} -- bash /home/ubuntu/deploy.sh


      - name: Verify deployment
        run: |
          sleep 10
          border0 client ssh ${{ secrets.BORDER0_SOCKET_NAME }} -- docker ps | grep faddy-backend
