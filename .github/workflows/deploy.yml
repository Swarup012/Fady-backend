name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
          cache-to: type=inline
          platforms: linux/amd64
      
      - name: Install Border0 CLI
        run: |
          wget https://download.border0.com/linux_amd64/border0 -O /tmp/border0
          chmod +x /tmp/border0
          sudo mv /tmp/border0 /usr/local/bin/border0
          border0 version

      - name: Authenticate Border0 CLI
        run: |
          border0 login --token ${{ secrets.BORDER0_TOKEN }}

      - name: Deploy to EC2 via Border0
        run: |
          border0 ssh --socket ${{ secrets.BORDER0_SOCKET_NAME }} \
            'bash -s' < /home/ubuntu/deploy.sh

      - name: Verify deployment
        run: |
          border0 ssh --socket ${{ secrets.BORDER0_SOCKET_NAME }} << 'ENDSSH'
            if docker ps | grep -q fady-backend; then
              echo "✅ Container is running"
              docker ps | grep fady-backend
            else
              echo "❌ Container is not running"
              exit 1
            fi
          ENDSSH

      - name: Cleanup Border0 session
        if: always()
        run: |
          border0 logout || true