name: Deploy Fady Backend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ─── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── 2. Docker Buildx ────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── 3. Login to Docker Hub ──────────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─── 4. Build & Push Docker image ────────────────────────────────────────
      # Backend env vars are injected at RUNTIME (not build time), so no build-args needed.
      # They are passed via `docker run --env-file` on the server.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:buildcache,mode=max

      # ─── 5. SSH into server and redeploy ─────────────────────────────────────
      # The server must have ~/faddy/.backend.env with all backend secrets.
      # GitHub Actions never sees those secrets — they stay on the server.
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ~/faddy-app

            echo "📦 Pulling latest backend image..."
            docker-compose pull backend

            echo "🚀 Restarting backend container..."
            docker-compose up -d backend

            echo "🧹 Cleaning up unused images..."
            docker image prune -f

            echo "✅ Backend deployed successfully!"

      # ─── 6. Quick smoke-test ─────────────────────────────────────────────────
      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            sleep 10
            cd ~/faddy-app
            echo "Checking container status..."
            docker-compose ps backend | grep running || (echo "❌ Container not running!" && exit 1)
            echo "Checking health endpoint..."
            curl -sf http://localhost:3000/health > /dev/null && echo "✅ Backend is live!" || echo "⚠️  Health check failed"
