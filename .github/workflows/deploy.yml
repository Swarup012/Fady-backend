name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      BORDER0_TOKEN: ${{ secrets.BORDER0_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
          cache-to: type=inline
          platforms: linux/amd64

      - name: Install Border0 CLI
        run: |
          wget https://download.border0.com/linux_amd64/border0 -O /tmp/border0
          chmod +x /tmp/border0
          sudo mv /tmp/border0 /usr/local/bin/border0
          border0 version

      - name: Test Border0 Authentication
        run: |
          border0 whoami

      - name: Final Border0 Sanity Test
        run: |
          mkdir -p ~/.border0
          echo '{"access_token":"${{ secrets.BORDER0_TOKEN }}"}' > ~/.border0/credentials.json
          chmod 600 ~/.border0/credentials.json

          # -T: Crucial! Disables terminal request which hangs in CI/CD
          # -o BatchMode=yes: Prevents waiting for any human prompts
          ssh -v -T \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            -o ConnectTimeout=60 \
            -o ProxyCommand="border0 client proxy %h" \
            ubuntu@${{ secrets.BORDER0_SOCKET_NAME }} \
            "whoami"
      - name: Deploy to EC2 via Border0
        env:
          BORDER0_TOKEN: ${{ secrets.BORDER0_TOKEN }}
        run: |
          # 1. We use standard Linux SSH
          # 2. We use 'border0 client proxy' as the tunnel (bypasses browser checks)
          # 3. We pass the token directly into the proxy command
          
          ssh -v \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ProxyCommand="border0 client proxy --token ${{ secrets.BORDER0_TOKEN }} %h" \
            ubuntu@ssh-ip-172-31-2-181 \
            "bash /home/ubuntu/deploy.sh"

      - name: Verify deployment
        run: |
          sleep 10
          border0 client ssh ${{ secrets.BORDER0_SOCKET_NAME }} -- docker ps | grep faddy-backend
