name: Deploy Backend to AWS EC2

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
          cache-to: type=inline
          platforms: linux/amd64

      - name: Install Border0 CLI
        run: |
          curl -sL https://download.border0.com/linux_amd64/border0 -o /usr/local/bin/border0
          chmod +x /usr/local/bin/border0

      - name: Deploy to EC2 via Border0
        env:
          # Use BORDER0_TOKEN; the CLI looks for this variable name by default
          BORDER0_TOKEN: ${{ secrets.BORDER0_TOKEN }}
          SSH_KEY_CONTENT: ${{ secrets.EC2_SSH_KEY }}
          SOCKET_NAME: ${{ secrets.BORDER0_SOCKET_NAME }}
        run: |
          # 1. Setup the PEM key file
          mkdir -p ~/.ssh
          echo "$SSH_KEY_CONTENT" > ~/.ssh/backend.pem
          chmod 600 ~/.ssh/backend.pem

          # 2. Execute deployment command
          # SYNTAX FIX: Remove --host and --token flags
          # The socket name is passed directly at the end of the proxy command
          ssh -i ~/.ssh/backend.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            -o ConnectTimeout=60 \
            -o ProxyCommand="border0 client proxy $SOCKET_NAME" \
            ubuntu@$SOCKET_NAME \
            "bash /home/ubuntu/deploy.sh"

      - name: Verify deployment
        env:
          BORDER0_TOKEN: ${{ secrets.BORDER0_TOKEN }}
          SOCKET_NAME: ${{ secrets.BORDER0_SOCKET_NAME }}
        run: |
          sleep 10
          # The CLI will automatically use BORDER0_TOKEN from the environment
          border0 client ssh $SOCKET_NAME -- "docker ps | grep faddy-backend"