name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ============================================
      # Code Checkout
      # ============================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================
      # Docker Build and Push
      # ============================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:latest
          cache-to: type=inline
          platforms: linux/amd64

      # ============================================
      # Border0 Setup
      # ============================================
      - name: Setup Border0
        uses: borderzero/setup-border0-action@v1
        with:
          token: ${{ secrets.BORDER0_TOKEN }}

      - name: Verify Border0 authentication
        run: |
          border0 version
          echo "Authenticated successfully"

      # ============================================
      # Deployment via Border0
      # ============================================
      - name: Deploy to EC2 via Border0
        timeout-minutes: 5
        run: |
          echo "🚀 Starting deployment to EC2..."
          
          border0 client ssh ${{ secrets.BORDER0_SOCKET_NAME }} << 'ENDSSH'
            set -e
            
            echo "📍 Connected to EC2 instance"
            echo "👤 Current user: $(whoami)"
            echo "📁 Current directory: $(pwd)"
            
            cd /home/ubuntu
            
            echo "🔄 Running deployment script..."
            bash deploy.sh
            
            echo "✅ Deployment script completed"
          ENDSSH
          
          echo "✅ Deployment commands executed successfully"

      # ============================================
      # Deployment Verification
      # ============================================
      - name: Verify deployment
        timeout-minutes: 3
        run: |
          echo "⏳ Waiting for container to stabilize..."
          sleep 15
          
          echo "🔍 Verifying deployment..."
          
          border0 client ssh ${{ secrets.BORDER0_SOCKET_NAME }} << 'ENDSSH'
            set -e
            
            echo "=== Docker Container Status ==="
            if docker ps | grep -q faddy-backend; then
              echo "✅ Container is running"
              docker ps | grep faddy-backend
            else
              echo "❌ Container is not running"
              echo ""
              echo "=== Container Logs (Last 50 lines) ==="
              docker logs --tail 50 faddy-backend 2>&1 || true
              exit 1
            fi
            
            echo ""
            echo "=== Health Check ==="
            if docker exec faddy-backend curl -f http://localhost:3000/health 2>/dev/null; then
              echo "✅ Health check passed"
            else
              echo "⚠️  Health endpoint not responding (container may still be starting)"
            fi
            
            echo ""
            echo "=== Deployment Information ==="
            echo "Container ID: $(docker ps --filter name=faddy-backend --format '{{.ID}}')"
            echo "Image: $(docker ps --filter name=faddy-backend --format '{{.Image}}')"
            echo "Status: $(docker ps --filter name=faddy-backend --format '{{.Status}}')"
            
          ENDSSH
          
          echo ""
          echo "✅ Deployment verified successfully!"

      # ============================================
      # Deployment Summary
      # ============================================
      - name: Deployment summary
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 DEPLOYMENT SUCCESSFUL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}:latest"
          echo "🏷️  SHA: ${{ github.sha }}"
          echo "🌐 Socket: ${{ secrets.BORDER0_SOCKET_NAME }}"
          echo "⏰ Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Deployment failed
        if: failure()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ DEPLOYMENT FAILED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Please check the logs above for details"
          echo "Socket: ${{ secrets.BORDER0_SOCKET_NAME }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit 1