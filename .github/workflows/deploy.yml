name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allows manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/faddy-backend:latest
          cache-to: type=inline
      
      # Install Border0 CLI
      - name: Install Border0 CLI
        run: |
          curl -sL https://download.border0.com/install.sh | sudo bash

      # Authenticate Border0 CLI
      - name: Authenticate Border0 CLI
        run: |
          border0 login --token ${{ secrets.BORDER0_TOKEN }}

      # Deploy to EC2 using Border0 SSH Socket
      - name: Deploy to EC2 via Border0
        env:
          BORDER0_TOKEN: ${{ secrets.BORDER0_TOKEN }}
        run: |
          border0 ssh --socket faddy-backend-ssh "cd ~ && source ~/.env && ./deploy.sh"

      # Verify deployment via Border0
      - name: Verify deployment via Border0
        env:
          BORDER0_TOKEN: ${{ secrets.BORDER0_TOKEN }}
        run: |
          border0 ssh --socket faddy-backend-ssh "echo 'Checking if container is running...' && docker ps | grep faddy-backend && echo 'Checking health endpoint...' && curl -f http://localhost:3000/health || exit 1 && echo '✅ Deployment successful!'"
