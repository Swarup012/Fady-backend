version: '3.8'

services:
  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: fady-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - fady-network-dev

  # Backend API Service (Development mode with hot reload)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: fady-backend-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fady-network-dev
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./logs:/app/logs
      # Exclude node_modules
      - /app/node_modules
    command: npm run dev
    extra_hosts:
      # Fix for Jio ISP DNS routing issue - bypass broken Jio DNS for Supabase
      - "atvdxtnuimpyhpknrwww.supabase.co:172.64.149.246"

networks:
  fady-network-dev:
    driver: bridge

volumes:
  redis-data-dev:
    driver: local
